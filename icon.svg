<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)" fill="white">
    <!-- Тарелка -->
    <ellipse cx="0" cy="20" rx="120" ry="40" fill="none" stroke="white" stroke-width="22"/>
    <!-- Вилка -->
    <g transform="translate(-50,-80)">
      <rect x="-4" y="-40" width="8" height="100" rx="4"/>
      <line x1="-12" y1="-40" x2="-12" y2="0" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <line x1="0" y1="-50" x2="0" y2="0" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <line x1="12" y1="-40" x2="12" y2="0" stroke="white" stroke-width="6" stroke-linecap="round"/>
    </g>
    <!-- Нож -->
    <g transform="translate(50,-80)">
      <rect x="-4" y="-20" width="8" height="80" rx="4"/>
      <path d="M-4,-20 Q-4,-60 4,-60 L4,-20 Z" fill="white"/>
    </g>
  </g>
</svg>